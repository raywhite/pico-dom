rules:
  unpinned-uses:
    config:
      policies:
        '*': hash-pin
  # arc-runner-set is our internal ARC fleet — accepted operational choice
  # for cost reasons. Per-file ignore so any new workflow using a
  # self-hosted runner shows up as a finding until reviewed.
  self-hosted-runner:
    ignore:
      - test.yml
      - zizmor.yml
  # impostor-commit fatally errors when it can't list tags on a referenced
  # repo. release.yml calls a reusable workflow in raywhite/github-workflows,
  # a private sibling repo in the same org, and the default GITHUB_TOKEN is
  # scoped to the current repo only. A fine-grained PAT would resolve it
  # but enterprise policy forces a 366-day expiry — operationally awkward.
  # Per-file `ignore:` doesn't help: it suppresses findings, not runtime
  # audit errors. Disable globally instead. The `unpinned-uses: hash-pin`
  # policy above still enforces that every third-party action is pinned
  # by SHA with a version comment, which is the main thing impostor-commit
  # would otherwise catch.
  impostor-commit:
    disable: true
