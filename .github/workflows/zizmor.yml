name: zizmor

permissions: {}

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: zizmor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Lint actions
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Install only zizmor (not the full mise.toml — this job has no need
      # for node). Version + checksums come from mise.toml / mise.lock,
      # keeping CI and `mise run lint-actions` on the same binary.
      - name: Install zizmor via mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          version: '2026.5.12'
          install_args: 'aqua:zizmorcore/zizmor'

      - name: Run zizmor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # `--format=github` emits annotations on PRs (limit 10 per step).
        # `--min-severity=medium` gates on med+ findings; info/low advisory.
        run: mise exec -- zizmor --format=github --min-severity=medium .
