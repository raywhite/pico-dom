name: zizmor

permissions: {}

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: zizmor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Lint actions
    runs-on: arc-runner-set
    permissions:
      contents: read # checkout
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Install only zizmor (not the full mise.toml — this job has no need
      # for node). Version + checksums come from mise.toml / mise.lock,
      # keeping CI and `mise run lint-actions` on the same binary.
      - name: Install zizmor via mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          version: '2026.5.12'
          install_args: 'aqua:zizmorcore/zizmor'

      - name: Run zizmor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # `--format=github` emits annotations on PRs (limit 10 per step).
        # `--min-severity=medium` gates on med+ findings; info/low advisory.
        run: mise exec -- zizmor --format=github --min-severity=medium .
