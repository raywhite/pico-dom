name: zizmor

permissions: {}

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: zizmor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Lint actions
    runs-on: arc-runner-set
    permissions:
      contents: read # checkout
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Install only zizmor (not the full mise.toml — this job has no need
      # for node). Version + checksums come from mise.toml / mise.lock,
      # keeping CI and `mise run lint-actions` on the same binary.
      - name: Install zizmor via mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          version: '2026.5.12'
          install_args: 'aqua:zizmorcore/zizmor'

      - name: Run zizmor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise exec -- zizmor --format=github --min-severity=medium .
